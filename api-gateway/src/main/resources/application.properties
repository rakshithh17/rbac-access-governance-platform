
spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**


spring.cloud.gateway.routes[1].id=access-service
spring.cloud.gateway.routes[1].uri=lb://ACCESS-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/access/**

spring.cloud.gateway.routes[2].id=asset-service
spring.cloud.gateway.routes[2].uri=http://localhost:8085
spring.cloud.gateway.routes[2].predicates[0]=Path=/assets/**


